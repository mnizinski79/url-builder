<div class="field">
  <div class="field-label-row">
    <label id="date-range-label" class="field-label">
      {{ label }}<span *ngIf="required" class="required"> *</span>
    </label>
    <app-tooltip *ngIf="tooltip" [text]="tooltip"></app-tooltip>
  </div>

  <div class="drp-trigger" (click)="togglePicker($event)" role="button" tabindex="0"
       (keydown)="onTriggerKeydown($event)"
       [attr.aria-expanded]="isOpen"
       aria-haspopup="dialog"
       aria-labelledby="date-range-label">
    <div class="drp-trigger-icon">
      <ph-icon name="calendar-blank" [size]="20"></ph-icon>
    </div>
    <span class="drp-field-text" [class.placeholder]="!displayText">
      {{ displayText || 'Select date range…' }}
    </span>
  </div>

  <div class="drp-picker-wrap" *ngIf="isOpen && !isMobile"
       [style.top.px]="pickerTop"
       [style.right.px]="pickerRight">
    <app-date-range-picker
      [singleMonth]="false"
      [startDate]="parsedStart"
      [endDate]="parsedEnd"
      (apply)="onApply($event)"
      (cancel)="onCancel()"
    ></app-date-range-picker>
  </div>

  <div class="drp-sheet-backdrop" *ngIf="isOpen && isMobile" (click)="onCancel()">
    <div class="drp-sheet" (click)="$event.stopPropagation()">
      <div class="drp-sheet-handle"></div>
      <app-date-range-picker
        [singleMonth]="true"
        [startDate]="parsedStart"
        [endDate]="parsedEnd"
        (apply)="onApply($event)"
        (cancel)="onCancel()"
      ></app-date-range-picker>
    </div>
  </div>
</div>
