<div class="card">
  <div class="card-main">
    <div class="card-name">{{ entry.name }}</div>
    <div class="card-url">{{ entry.url }}</div>
    <div class="card-meta">{{ entry.timestamp }}</div>
  </div>
  <div class="card-actions">
    <button type="button" class="card-btn" [class.copied]="copied" (click)="copy()" [attr.aria-label]="copied ? 'Copied' : 'Copy URL'">
      {{ copied ? '✓' : '⧉' }}
    </button>
    <button type="button" class="card-btn delete" (click)="delete()" aria-label="Delete">✕</button>
  </div>
</div>
