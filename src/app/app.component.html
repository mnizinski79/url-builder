<div class="app-shell">
  <main class="main-scroll">
    <app-header
      (openSaved)="openSaved()"
      (openHistory)="openHistory()"
    ></app-header>

    <app-tab-bar
      [activeTab]="activeTab"
      (tabChange)="onTabChange($event)"
    ></app-tab-bar>

    <app-url-bar
      [fullUrl]="currentUrl"
      (urlCopied)="onCopy()"
    ></app-url-bar>

    <div class="url-bar-overlap-strip"></div>

    <app-form-container
      [activeTab]="activeTab"
      (formChanged)="onFormChanged()"
    ></app-form-container>

    <div class="save-action-bar">
      <button type="button" class="btn-save-url" (click)="openSaveModal()">
        <ph-icon name="check" [size]="16"></ph-icon>
        Save URL
      </button>
      <button type="button" class="btn-clear-form" (click)="clearForm()">
        <ph-icon name="x" [size]="16"></ph-icon>
        Clear form
      </button>
    </div>
  </main>

  <app-save-modal
    *ngIf="showSaveModal"
    [url]="currentUrl"
    (saved)="onSaved($event)"
    (cancelled)="onSaveCancelled()"
  ></app-save-modal>

  <app-drawer
    [open]="drawerOpen"
    [initialTab]="drawerTab"
    (closed)="closeDrawer()"
  ></app-drawer>
</div>
