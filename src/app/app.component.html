<div class="app-shell">
  <app-header
    (openSaved)="openSaved()"
    (openHistory)="openHistory()"
  ></app-header>

  <app-url-bar
    [fullUrl]="currentUrl"
    (urlCopied)="onCopy()"
  ></app-url-bar>

  <app-tab-bar
    [activeTab]="activeTab"
    (tabChange)="onTabChange($event)"
  ></app-tab-bar>

  <main class="main-scroll">
    <app-form-container
      [activeTab]="activeTab"
      (formChanged)="onFormChanged()"
    ></app-form-container>

    <div class="save-action-bar">
      <button type="button" class="btn-save-url" (click)="openSaveModal()">Save URL</button>
    </div>
  </main>

  <app-save-modal
    *ngIf="showSaveModal"
    [url]="currentUrl"
    (saved)="onSaved($event)"
    (cancelled)="onSaveCancelled()"
  ></app-save-modal>

  <app-drawer
    [open]="drawerOpen"
    [initialTab]="drawerTab"
    (closed)="closeDrawer()"
  ></app-drawer>
</div>
